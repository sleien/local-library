services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bibliothek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bibliothek}
      POSTGRES_DB: ${POSTGRES_DB:-bibliothek}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bibliothek}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    # Build locally from the repository, or comment out `build` to pull the
    # published image (ghcr.io/sleien/local-library) instead.
    build: .
    image: ${IMAGE:-ghcr.io/sleien/local-library:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in your .env file}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bibliothek}:${POSTGRES_PASSWORD:-bibliothek}@db:5432/${POSTGRES_DB:-bibliothek}
      DATA_DIR: /data
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8000}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_DISPLAY_NAME: ${OIDC_DISPLAY_NAME:-Authentik}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
    volumes:
      - app-data:/data
    ports:
      - "${PORT:-8000}:8000"

volumes:
  db-data:
  app-data:
